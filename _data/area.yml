meta:
  name: Caching
  description: An index and topic collection covering API-accessible caching services,
    in-memory data stores, key-value caches, and edge/CDN cache APIs. Caching reduces
    latency, lowers backend load, and improves API consumer experience by serving
    frequently requested data from memory or geographically distributed edges. This
    collection covers managed in-memory data stores like Redis, Amazon ElastiCache,
    and Google Cloud Memorystore; high-throughput alternatives such as Dragonfly,
    Aerospike, and Hazelcast; and edge cache services from Cloudflare, Fastly, Akamai,
    AWS CloudFront, and Vercel. It focuses on caching as a service or product, not
    on HTTP cache header semantics handled at the gateway or proxy layer.
  tags:
  - Cache
  - Caching
  - In-Memory Database
  - Edge Cache
  - Key-Value Store
  - CDN
  - Content Delivery Network
  portal: https://apievangelist.com
  github: https://github.com/api-evangelist
  repo: caching
